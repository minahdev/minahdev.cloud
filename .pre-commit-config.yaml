repos:
  - repo: local
    hooks:
      # ── Flutter ──────────────────────────────────────────
      - id: flutter-analyze
        name: Flutter Analyze
        entry: bash -c "cd minahflutter && flutter analyze"
        language: system
        files: \.dart$
        pass_filenames: false

      - id: flutter-format
        name: Flutter Format
        entry: bash -c "cd minahflutter && dart format --set-exit-if-changed ."
        language: system
        files: \.dart$
        pass_filenames: false

      # ── Python (minahai) ─────────────────────────────────
      - id: ruff-check
        name: Ruff Lint
        entry: bash -c "cd minahai && ruff check ."
        language: system
        files: \.py$
        pass_filenames: false

      - id: ruff-format
        name: Ruff Format
        entry: bash -c "cd minahai && ruff format --check ."
        language: system
        files: \.py$
        pass_filenames: false

      - id: mypy
        name: Mypy Type Check
        entry: bash -c "cd minahai && mypy ."
        language: system
        files: \.py$
        pass_filenames: false

      - id: import-linter
        name: Import Linter (Star Topology)
        entry: bash -c "cd minahai && lint-imports"
        language: system
        files: \.py$
        pass_filenames: false

      # ── Next.js (minahview) ──────────────────────────────
      - id: eslint
        name: ESLint
        entry: bash -c "cd minahview && pnpm eslint ."
        language: system
        files: \.(ts|tsx)$
        pass_filenames: false

      - id: prettier-check
        name: Prettier Format Check
        entry: bash -c "cd minahview && pnpm prettier --check ."
        language: system
        files: \.(ts|tsx|css|json|md)$
        pass_filenames: false

      # ── Harness Validator ────────────────────────────────
      - id: harness-validate
        name: Star Topology Harness Validator
        entry: python scripts/validate_harness.py
        language: system
        files: \.md$
        pass_filenames: false
