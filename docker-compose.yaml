services:
  # --- 백엔드 서비스 ---
  backend:
    container_name: minah_backend
    build:
      context: ./minahai
    ports:
      - "8000:8000"
    env_file:
      - ./minahai/.env
    environment:
      - N8N_EMAIL_WEBHOOK_URL=http://n8n:5678/webhook/send-email
      - N8N_TELEGRAM_WEBHOOK_URL=http://n8n:5678/webhook/send-telegram
      - OLLAMA_URL=http://host.docker.internal:11434/api/chat
      - DATABASE_URL=postgresql+psycopg://minah_user:minah_password@pgvector:5432/minah_db?sslmode=disable
    extra_hosts:
      - "host.docker.internal:host-gateway"
    volumes:
      # 로컬 학습 산출물(best.pt)을 컨테이너에서 그대로 읽도록 마운트
      - ./minahai/apps/vision/resources/yolo_train/runs:/app/apps/vision/resources/yolo_train/runs
    depends_on:
      - pgvector
      - redis
      - neo4j

  # --- 프론트엔드 서비스 ---
  frontend:
    container_name: minah_frontend
    build:
      context: ./minahview
    ports:
      - "3000:3000"
    env_file:
      - ./minahview/.env.local
    environment:
      - BACKEND_URL=http://backend:8000
    depends_on:
      - backend

  # --- n8n ---
  n8n:
    container_name: minah_n8n
    image: n8nio/n8n
    ports:
      - "5678:5678"
    volumes:
      - n8n_data:/home/node/.n8n
    restart: unless-stopped

  # --- PostgreSQL + pgvector ---
  pgvector:
    container_name: minah_pgvector
    image: pgvector/pgvector:pg17
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: minah_user
      POSTGRES_PASSWORD: minah_password
      POSTGRES_DB: minah_db
    volumes:
      - pgvector_data:/var/lib/postgresql/data
    restart: unless-stopped

  # --- DB 뷰어 (브라우저에서 테이블 확인) ---
  adminer:
    container_name: minah_adminer
    image: adminer:latest
    ports:
      - "8080:8080"
    environment:
      ADMINER_DEFAULT_SERVER: pgvector
    depends_on:
      - pgvector
    restart: unless-stopped

  # --- Redis ---
  redis:
    container_name: minah_redis
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    restart: unless-stopped

  # --- Graph DB ---
  neo4j:
    container_name: minah_neo4j
    image: neo4j:5
    ports:
      - "7474:7474"
      - "7687:7687"
    environment:
      NEO4J_AUTH: neo4j/minah_password
    volumes:
      - neo4j_data:/data
    restart: unless-stopped

volumes:
  n8n_data:
    external: true
  pgvector_data:
  redis_data:
  neo4j_data:
